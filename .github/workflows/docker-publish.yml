name: Build, publish to Dockerhub and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_NAMESPACE }}/${{ github.event.repository.name }}:latest
            ${{ vars.DOCKERHUB_NAMESPACE }}/${{ github.event.repository.name }}:${{ github.sha }}

  deploy-andrei:
    runs-on: ["self-hosted", "andrei"]
    if: github.actor == 'andreistan26'
    steps:
      - run: curl -X POST http://127.0.0.1:9000/api/webhooks/8247841a-4ba8-4ff0-8fa4-30f615f765a8

